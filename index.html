<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />

  <!-- UYGULAMA İKONU -->
  <link rel="icon" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">

  <!-- MOBİL UYGULAMA AYARLARI -->
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Üretim">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Üretim Girişi</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      overflow: hidden;
    }

    .header {
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
    }

    .form-area {
      padding: 20px;
    }

    label {
      display: block;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      margin-top: 14px;
      color: #111827;
    }

    input, select {
      width: 100%;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      background: white;
    }

    input:focus, select:focus {
      border-color: #2563eb;
    }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #16a34a;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #15803d;
    }

    .message {
      margin-top: 16px;
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      min-height: 22px;
    }

    .success {
      color: #15803d;
    }

    .error {
      color: #dc2626;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">Üretim Girişi</div>

    <div class="form-area">
      <form
        id="uretimForm"
        action="https://script.google.com/macros/s/AKfycbwuJLo1oYX50R9OoPywegWtwCPaRdMmcTpm4U8FnXVqvwaDHpauOp9BMxFWnmbPTOl1/exec"
        method="POST"
        target="gizliFrame"
      >
        <label for="tarih">Tarih</label>
        <input type="date" id="tarih" name="tarih" required>

        <label for="bantAdi">Bant Adı</label>
        <select id="bantAdi" name="bantAdi" required>
          <option value="">Seçiniz</option>
          <option value="BANT-1">BANT-1</option>
          <option value="BANT-2">BANT-2</option>
          <option value="BANT-3">BANT-3</option>
          <option value="BANT-4">BANT-4</option>
          <option value="BASKI">BASKI</option>
          <option value="PAKETLEME">PAKETLEME</option>
        </select>

        <label for="orderNo">Order No</label>
        <input type="text" id="orderNo" name="orderNo" placeholder="Order no girin" required>

        <label for="adet">Adet</label>
        <input type="number" id="adet" name="adet" placeholder="Adet girin" min="1" required>

        <button type="submit">Kaydet</button>
      </form>

      <iframe name="gizliFrame" style="display:none;"></iframe>
      <div id="message" class="message"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById("uretimForm");
    const message = document.getElementById("message");

    const tarihInput = document.getElementById("tarih");
    const bugun = new Date().toISOString().split("T")[0];
    tarihInput.value = bugun;

    form.addEventListener("submit", function () {
      message.textContent = "Kaydediliyor...";
      message.className = "message";

      // Telefon titreşimi (çok güzel detay)
      if (navigator.vibrate) {
        navigator.vibrate(100);
      }

      setTimeout(() => {
        message.textContent = "✔ Kayıt alındı";
        message.className = "message success";

        document.getElementById("orderNo").value = "";
        document.getElementById("adet").value = "";
        document.getElementById("bantAdi").value = "";
        document.getElementById("tarih").value = bugun;
      }, 1000);
    });
  </script>
</body>
</html>
