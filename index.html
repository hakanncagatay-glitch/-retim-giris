<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="production.png">
  <link rel="apple-touch-icon" href="production.png">

  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Üretim">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Üretim Girişi</title>

  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
      margin: 0;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .header {
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
    }

    .form-area { padding: 20px; }

    label {
      display: block;
      font-size: 15px;
      font-weight: 600;
      margin: 14px 0 8px;
      color: #111827;
    }

    input, select {
      width: 100%;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 16px;
      background: white;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #2563eb;
    }

    .order-wrap {
      display: flex;
      width: 100%;
    }

    .order-prefix {
      min-width: 68px;
      padding: 14px 12px;
      border: 1px solid #d1d5db;
      border-right: none;
      border-radius: 12px 0 0 12px;
      background: #e5e7eb;
      color: #111827;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
    }

    .order-input {
      border-radius: 0 12px 12px 0 !important;
    }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #16a34a;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .message {
      margin-top: 16px;
      text-align: center;
      font-weight: 600;
      min-height: 22px;
    }

    .success { color: #15803d; }
    .error { color: #dc2626; }
  </style>
</head>

<body>
<div class="container">
  <div class="header">Üretim Girişi</div>

  <div class="form-area">
    <form
      id="uretimForm"
      action="https://script.google.com/macros/s/AKfycbwuJLo1oYX50R9OoPywegWtwCPaRdMmcTpm4U8FnXVqvwaDHpauOp9BMxFWnmbPTOl1/exec"
      method="POST"
      target="gizliFrame"
    >

      <label for="tarih">Tarih</label>
      <input type="date" id="tarih" name="tarih" required>

      <label for="bantAdi">Bant</label>
      <select id="bantAdi" name="bantAdi" required>
        <option value="">Seçiniz</option>
        <option value="BANT-1">BANT-1</option>
        <option value="BANT-2">BANT-2</option>
        <option value="BANT-3">BANT-3</option>
        <option value="BANT-4">BANT-4</option>
        <option value="BASKI">BASKI</option>
        <option value="PAKETLEME">PAKETLEME</option>
      </select>

      <label for="orderSuffix">Order</label>
      <div class="order-wrap">
        <div class="order-prefix">DA-</div>
        <input
          type="text"
          id="orderSuffix"
          class="order-input"
          placeholder="Order no girin"
          autocomplete="off"
          required
        >
      </div>

      <input type="hidden" id="orderNo" name="orderNo">

      <label for="adet">Adet</label>
      <input type="number" id="adet" name="adet" min="1" required>

      <button type="submit">Kaydet</button>
    </form>

    <iframe name="gizliFrame" style="display:none;"></iframe>
    <div id="message" class="message"></div>
  </div>
</div>

<script>
const form = document.getElementById("uretimForm");
const message = document.getElementById("message");
const tarihInput = document.getElementById("tarih");
const orderSuffixInput = document.getElementById("orderSuffix");
const hiddenOrderInput = document.getElementById("orderNo");
const bugun = new Date().toISOString().split("T")[0];

tarihInput.value = bugun;

form.addEventListener("submit", (e) => {
  const suffix = orderSuffixInput.value.trim().toUpperCase();

  if (!suffix) {
    e.preventDefault();
    message.textContent = "Order alanı boş olamaz.";
    message.className = "message error";
    orderSuffixInput.focus();
    return;
  }

  hiddenOrderInput.value = "DA-" + suffix.replace(/^DA-?/i, "");

  message.textContent = "Kaydediliyor...";
  message.className = "message";

  if (navigator.vibrate) navigator.vibrate(100);

  setTimeout(() => {
    message.textContent = "✔ Kayıt alındı";
    message.className = "message success";

    const seciliBant = document.getElementById("bantAdi").value;
    form.reset();
    tarihInput.value = bugun;
    document.getElementById("bantAdi").value = seciliBant;
    hiddenOrderInput.value = "";
  }, 1000);
});
</script>

</body>
</html>
