<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <!-- ICON -->
  <link rel="icon" href="production.png">
  <link rel="apple-touch-icon" href="production.png">

  <!-- MOBİL APP -->
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Üretim">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Üretim Girişi</title>

  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
      margin: 0;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .header {
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
    }

    .form-area { padding: 20px; }

    label {
      display: block;
      font-size: 15px;
      font-weight: 600;
      margin: 14px 0 8px;
      color: #111827;
    }

    input, select {
      width: 100%;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 16px;
      background: white;
    }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #16a34a;
      color: white;
      font-size: 18px;
      font-weight: bold;
    }

    .message {
      margin-top: 16px;
      text-align: center;
      font-weight: 600;
      min-height: 22px;
    }

    .success { color: #15803d; }
  </style>
</head>

<body>
<div class="container">
  <div class="header">Üretim Girişi</div>

  <div class="form-area">
    <form
      id="uretimForm"
      action="https://script.google.com/macros/s/AKfycbwuJLo1oYX50R9OoPywegWtwCPaRdMmcTpm4U8FnXVqvwaDHpauOp9BMxFWnmbPTOl1/exec"
      method="POST"
      target="gizliFrame"
    >

      <label>Tarih</label>
      <input type="date" id="tarih" name="tarih" required>

      <label>Bant</label>
      <select name="bantAdi" required>
        <option value="">Seçiniz</option>
        <option>BANT-1</option>
        <option>BANT-2</option>
        <option>BANT-3</option>
        <option>BANT-4</option>
        <option>BASKI</option>
        <option>PAKETLEME</option>
      </select>

      <label>Order</label>
      <input type="text" name="orderNo" required>

      <label>Adet</label>
      <input type="number" name="adet" min="1" required>

      <button>Kaydet</button>
    </form>

    <iframe name="gizliFrame" style="display:none;"></iframe>
    <div id="message" class="message"></div>
  </div>
</div>

<script>
const form = document.getElementById("uretimForm");
const message = document.getElementById("message");

const bugun = new Date().toISOString().split("T")[0];
document.getElementById("tarih").value = bugun;

form.addEventListener("submit", () => {
  message.textContent = "Kaydediliyor...";

  if (navigator.vibrate) navigator.vibrate(100);

  setTimeout(() => {
    message.textContent = "✔ Kayıt alındı";
    message.className = "message success";

    form.reset();
    document.getElementById("tarih").value = bugun;
  }, 1000);
});
</script>

</body>
</html>
