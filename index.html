<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />

  <!-- LOGO -->
  <link rel="icon" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Üretim Girişi</title>

  <!-- HTML2CANVAS -->
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#f3f4f6;
      padding:15px;
    }

    .container {
      max-width:500px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:16px;
      box-shadow:0 8px 24px rgba(0,0,0,0.1);
    }

    h2 {
      text-align:center;
    }

    input, select {
      width:100%;
      padding:12px;
      margin-top:8px;
      border-radius:10px;
      border:1px solid #ddd;
    }

    button {
      width:100%;
      padding:14px;
      margin-top:15px;
      border:none;
      border-radius:10px;
      background:#16a34a;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .admin {
      margin-top:25px;
      padding-top:20px;
      border-top:1px solid #eee;
    }

  </style>
</head>

<body>

<div class="container">

  <h2>Üretim Girişi</h2>

  <input type="date" id="tarih">

  <select id="bant">
    <option>BANT-1</option>
    <option>BANT-2</option>
    <option>BANT-3</option>
    <option>BANT-4</option>
    <option>BASKI</option>
    <option>PAKETLEME</option>
  </select>

  <input type="text" id="order" placeholder="DA- Order">

  <input type="number" id="adet" placeholder="Adet">

  <button onclick="kaydet()">Kaydet</button>

  <!-- ADMIN LOGIN -->
  <div id="adminLogin" style="margin-top:25px;">
    <input type="password" id="adminPass" placeholder="Yönetici şifre">
    <button onclick="adminGiris()">Giriş</button>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="admin" style="display:none;">

    <input type="date" id="adminTarih">

    <button onclick="veriGetir()">Veriyi Getir</button>
    <button onclick="raporOlustur()">📊 Kurumsal Rapor</button>

    <div id="adminSonuc"></div>

  </div>

</div>

<script>

const scriptBase = "SENİN_SCRIPT_LINKİN";

let adminData = [];
let secilenTarih = null;

function adminGiris() {
  if (document.getElementById("adminPass").value === "1234") {
    document.getElementById("adminLogin").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
  } else {
    alert("Şifre yanlış");
  }
}

function jsonp(url) {
  return new Promise((resolve) => {
    const cb = "cb" + Date.now();

    window[cb] = function(data) {
      resolve(data);
      delete window[cb];
      script.remove();
    };

    const script = document.createElement("script");
    script.src = url + "&callback=" + cb;
    document.body.appendChild(script);
  });
}

async function veriGetir() {

  const tarih = document.getElementById("adminTarih").value;

  if (!tarih) {
    alert("Tarih seç");
    return;
  }

  secilenTarih = tarih.split("-").reverse().join(".");

  const data = await jsonp(scriptBase + "?action=list&bantAdi=TUM");

  adminData = data.kayitlar;

  const filtre = adminData.filter(x => x.tarih === secilenTarih);

  let toplam = 0;
  let html = "";

  filtre.forEach(x => {
    toplam += Number(x.adet);
    html += `<div>${x.bantAdi} | ${x.orderNo} | ${x.adet}</div>`;
  });

  html += `<hr><b>TOPLAM: ${toplam}</b>`;

  document.getElementById("adminSonuc").innerHTML = html;
}

function raporOlustur() {

  const filtre = adminData.filter(x => x.tarih === secilenTarih);

  let toplam = 0;
  let bant = {};

  filtre.forEach(x => {
    toplam += Number(x.adet);

    if (!bant[x.bantAdi]) bant[x.bantAdi] = 0;
    bant[x.bantAdi] += Number(x.adet);
  });

  let bantHtml = "";

  Object.keys(bant).forEach(b => {
    bantHtml += `
      <div style="display:flex; justify-content:space-between;">
        <span>${b}</span>
        <b>${bant[b]}</b>
      </div>
    `;
  });

  const html = `
    <div id="raporKart" style="width:350px; padding:20px; background:white; border-radius:16px;">
      
      <div style="text-align:center;">
        <img src="logo.png" style="height:40px;">
        <h3>ÜRETİM RAPORU</h3>
        <div>${secilenTarih}</div>
      </div>

      <hr>

      ${bantHtml}

      <hr>

      <div style="text-align:center;">
        <h2>${toplam}</h2>
        <div>TOPLAM ADET</div>
      </div>

    </div>
  `;

  const div = document.createElement("div");
  div.innerHTML = html;
  document.body.appendChild(div);

  html2canvas(document.getElementById("raporKart")).then(canvas => {
    const img = canvas.toDataURL();
    document.body.removeChild(div);

    const w = window.open("");
    w.document.write(`<img src="${img}" style="width:100%">`);
  });

}

</script>

</body>
</html>
